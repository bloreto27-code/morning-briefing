name: Morning Briefing

on:
  schedule:
    # 7:30 AM ET = 11:30 UTC (Eastern Daylight Time)
    # Adjust to 12:30 UTC during Eastern Standard Time (Nov-Mar)
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    # Allows you to run it manually from the GitHub Actions tab

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning briefing
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          BRIEFING_EMAIL_FROM: ${{ secrets.BRIEFING_EMAIL_FROM }}
          BRIEFING_EMAIL_TO: ${{ secrets.BRIEFING_EMAIL_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: |
          cd scripts
          python briefing.py

      - name: Commit updated data
        run: |
          git config user.name "Morning Briefing Bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git add data/history/ docs/data.json
          git diff --cached --quiet || git commit -m "Daily briefing — $(date -u +'%Y-%m-%d')"
          git push
