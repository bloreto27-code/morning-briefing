name: Morning Briefing

on:
  schedule:
    # All times EDT (UTC-4, Apr-Oct). In Nov-Mar shift each by +1 hour.
    - cron: '30 11 * * 1-5'   # 7:30 AM ET  — Morning Briefing
    - cron: '0 16 * * 1-5'    # 12:00 PM ET — Midday Update
    - cron: '0 20 * * 1-5'    # 4:00 PM ET  — Market Close
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning briefing
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts
          python briefing.py

      - name: Commit updated data
        run: |
          git config user.name "Morning Briefing Bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git add data/history/ docs/data.json
          git diff --cached --quiet || git commit -m "Daily briefing — $(date -u +'%Y-%m-%d')"
          git push

  deploy-pages:
    needs: briefing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
