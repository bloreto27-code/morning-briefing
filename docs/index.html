<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --blue: #58a6ff; --gold: #F5A623;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; max-width:1200px; margin:0 auto; }

  /* Nav */
  .top-nav { display:flex; border-bottom:1px solid var(--border); background:var(--card); position:sticky; top:0; z-index:50; padding:0 20px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .nav-tab { padding:13px 22px; background:none; border:none; color:var(--muted); font-size:.88rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; }
  .nav-tab:hover { color:var(--text); }
  .nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  /* Layout */
  .page-header { padding:18px 20px 0; }
  #briefingView,#holdingsView,#watchlistView { padding:20px; }
  h1 { font-size:1.5rem; margin-bottom:4px; }
  h2 { font-size:1.05rem; margin-bottom:12px; color:var(--blue); border-bottom:1px solid var(--border); padding-bottom:6px; }
  .subtitle { color:var(--muted); font-size:.85rem; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:768px){.grid-2{grid-template-columns:1fr;}}

  /* Utility */
  .verdict-line { margin-bottom:6px; font-size:.95rem; }
  .pos{color:var(--green);} .neg{color:var(--red);} .warn{color:var(--yellow);} .hold{color:var(--muted);}
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th { text-align:left; color:var(--muted); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--border); }
  td { padding:6px 8px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  .r { text-align:right; }
  .progress-row { margin-bottom:10px; }
  .progress-label { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:3px; }
  .progress-bar-bg { background:var(--border); border-radius:4px; height:20px; position:relative; overflow:hidden; }
  .progress-bar-fill { height:100%; border-radius:4px; transition:width .5s; }
  .progress-bar-target { position:absolute; top:0; height:100%; width:2px; background:var(--yellow); }
  .progress-bar-text { position:absolute; top:0; left:8px; line-height:20px; font-size:.75rem; font-weight:600; }
  .stat { text-align:center; }
  .stat-value { font-size:1.6rem; font-weight:700; }
  .stat-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; }
  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.75rem; font-weight:600; }
  .badge-buy  { background:rgba(63,185,80,.15); color:var(--green); }
  .badge-hold { background:rgba(139,148,158,.15); color:var(--muted); }
  .badge-breach { background:rgba(248,81,73,.15); color:var(--red); }
  .badge-watch { background:rgba(210,153,34,.15); color:var(--yellow); }
  .badge-nochase { background:rgba(248,81,73,.15); color:var(--red); }
  .badge-near { background:rgba(210,153,34,.15); color:var(--yellow); }
  .badge-ok { background:rgba(63,185,80,.15); color:var(--green); }
  .badge-spec { background:rgba(248,81,73,.12); color:var(--red); border:1px solid rgba(248,81,73,.3); }
  .news-item { padding:5px 0; border-bottom:1px solid var(--border); font-size:.78rem; line-height:1.45; }
  .news-item:last-child { border-bottom:none; }
  .news-pub { font-size:.68rem; color:var(--muted); margin-top:2px; }
  .collapsible-toggle { cursor:pointer; user-select:none; display:flex; justify-content:space-between; align-items:center; }
  .collapsible-toggle::after { content:'\25B2'; font-size:.7rem; color:var(--muted); transition:transform .2s; }
  .collapsible-toggle.collapsed::after { transform:rotate(180deg); }
  .collapsible-body { overflow:hidden; max-height:4000px; transition:max-height .4s ease; }
  .collapsible-body.hidden { max-height:0 !important; }
  .warning-box { background:rgba(210,153,34,.1); border:1px solid var(--yellow); border-radius:6px; padding:10px 14px; margin-bottom:10px; font-size:.85rem; color:var(--yellow); }
  .thesis-flag { background:rgba(248,81,73,.1); border:1px solid var(--red); border-radius:6px; padding:10px 14px; margin-bottom:10px; font-size:.85rem; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:16px; }

  /* Clickable Ticker */
  .tk { color:var(--gold); cursor:pointer; font-weight:700; border-bottom:1px solid transparent; transition:border-color .12s,color .12s; display:inline; }
  .tk:hover { color:#ffcf6e; border-bottom-color:rgba(245,166,35,.6); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; justify-content:center; align-items:flex-start; padding:20px 12px; overflow-y:auto; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--card); border:1px solid var(--border); border-radius:12px; width:100%; max-width:920px; min-height:580px; display:flex; flex-direction:column; margin:auto; box-shadow:0 24px 80px rgba(0,0,0,.7); animation:modalIn .18s ease; }
  @keyframes modalIn { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;} }
  .modal-hdr { padding:18px 20px 14px; display:flex; align-items:flex-start; gap:16px; border-bottom:1px solid var(--border); }
  .modal-hdr-left { flex:1; min-width:0; }
  .modal-hdr-ticker { font-size:1.7rem; font-weight:700; color:var(--gold); line-height:1; }
  .modal-hdr-company { font-size:.85rem; color:var(--muted); margin-top:3px; }
  .modal-hdr-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .modal-price { font-size:1.3rem; font-weight:700; }
  .modal-day { font-size:.85rem; }
  .modal-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; }
  .modal-badge-sm { font-size:.7rem; padding:2px 8px; border-radius:4px; background:var(--bg); border:1px solid var(--border); color:var(--muted); }
  .modal-close { background:none; border:none; color:var(--muted); font-size:1.7rem; cursor:pointer; line-height:1; padding:0; align-self:flex-start; margin-left:8px; }
  .modal-close:hover { color:var(--text); }
  .modal-tabs { display:flex; padding:0 20px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
  .modal-tab-btn { padding:10px 20px; background:none; border:none; color:var(--muted); font-size:.875rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; }
  .modal-tab-btn:hover { color:var(--text); }
  .modal-tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }
  .modal-tab-pane { display:none; padding:20px; flex:1; overflow-y:auto; }
  .modal-tab-pane.active { display:block; }

  /* Profile sections */
  .pf-2col { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media(max-width:640px){.pf-2col{grid-template-columns:1fr;}}
  .pf-section { margin-bottom:20px; }
  .pf-label { font-size:.66rem; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .pf-label::after { content:''; flex:1; height:1px; background:rgba(245,166,35,.2); }
  .pf-thesis-text { font-size:.86rem; line-height:1.65; color:var(--text); }
  .pf-zone-row { display:flex; justify-content:space-between; padding:5px 0; font-size:.83rem; border-bottom:1px solid var(--border); }
  .pf-zone-row:last-child { border-bottom:none; }
  .pf-zone-label { color:var(--muted); }
  .pf-zone-val { font-weight:600; }
  .good-price-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
  .good-price-main { font-size:1.1rem; font-weight:700; line-height:1.2; }
  .good-price-sub { font-size:.75rem; color:var(--muted); margin-top:3px; }
  .pf-score-block { display:flex; align-items:center; gap:16px; }
  .pf-score-num { font-size:2.8rem; font-weight:700; line-height:1; }
  .pf-score-label { font-size:.8rem; font-weight:600; margin-top:2px; }
  .pf-score-sub { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .pf-cap-row,.pf-pos-row { display:flex; justify-content:space-between; padding:5px 0; font-size:.84rem; border-bottom:1px solid var(--border); }
  .pf-cap-row:last-child,.pf-pos-row:last-child { border-bottom:none; }
  .pf-cap-label,.pf-pos-label { color:var(--muted); }
  .pf-trigger-list { list-style:none; }
  .pf-trigger-list li { padding:4px 0 4px 14px; font-size:.84rem; line-height:1.45; position:relative; border-bottom:1px solid var(--border); }
  .pf-trigger-list li:last-child { border-bottom:none; }
  .pf-trigger-list li::before { content:'•'; position:absolute; left:0; color:var(--muted); }
  .pf-trigger-list li.active-flag { color:var(--red); }
  .pf-trigger-list li.active-flag::before { color:var(--red); }
  .pf-news-item { padding:6px 0; border-bottom:1px solid var(--border); font-size:.8rem; line-height:1.4; }
  .pf-news-item:last-child { border-bottom:none; }
  .pf-news-meta { font-size:.68rem; color:var(--muted); margin-top:2px; }
  .pf-watchlist-tag { display:inline-block; padding:4px 12px; background:rgba(88,166,255,.1); border:1px solid var(--blue); border-radius:6px; font-size:.82rem; color:var(--blue); margin-top:4px; }
  .active-flag-banner { background:rgba(248,81,73,.12); border:1px solid var(--red); border-radius:6px; padding:8px 12px; margin-bottom:10px; font-size:.8rem; color:var(--red); }

  /* Ask AI Tab */
  .ai-tab-wrap { display:flex; flex-direction:column; gap:14px; }
  .ai-tab-textarea { width:100%; height:220px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px; font-size:.85rem; font-family:inherit; resize:vertical; outline:none; line-height:1.6; }
  .ai-tab-textarea:focus { border-color:var(--gold); }
  .ai-tab-actions { display:flex; gap:10px; align-items:center; }
  .ai-open-btn { background:var(--gold); border:none; color:#000; font-weight:700; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:.9rem; transition:opacity .15s; }
  .ai-open-btn:hover { opacity:.88; }
  .ai-clear-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:10px 16px; border-radius:8px; cursor:pointer; font-size:.85rem; }
  .ai-clear-btn:hover { border-color:var(--muted); color:var(--text); }

  /* Chat Panel */
  #chatFab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; background:var(--gold); border:none; border-radius:50%; font-size:1.3rem; cursor:pointer; z-index:250; box-shadow:0 4px 20px rgba(245,166,35,.45); display:flex; align-items:center; justify-content:center; transition:transform .15s,box-shadow .15s; color:#000; }
  #chatFab:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(245,166,35,.6); }
  #chatPanelOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:290; }
  #chatPanelOverlay.open { display:block; }
  #chatPanel { position:fixed; top:0; right:-440px; width:420px; max-width:95vw; height:100vh; background:var(--bg); border-left:1px solid var(--border); z-index:300; display:flex; flex-direction:column; transition:right .28s cubic-bezier(.4,0,.2,1); box-shadow:-4px 0 40px rgba(0,0,0,.55); }
  #chatPanel.open { right:0; }
  .chat-header { display:flex; align-items:center; gap:8px; padding:13px 14px; border-bottom:1px solid var(--border); background:var(--card); flex-shrink:0; }
  .chat-header-title { font-weight:700; font-size:.92rem; flex:1; display:flex; align-items:center; gap:8px; }
  .online-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; box-shadow:0 0 6px var(--gold); display:inline-block; }
  .chat-hdr-btn { background:none; border:1px solid var(--border); color:var(--muted); font-size:.72rem; padding:3px 9px; border-radius:5px; cursor:pointer; }
  .chat-hdr-btn:hover { color:var(--text); border-color:var(--muted); }
  .chat-close-btn { background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; padding:0 2px; line-height:1; }
  .chat-close-btn:hover { color:var(--text); }
  .chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
  .chat-msg { max-width:93%; font-size:.83rem; line-height:1.55; }
  .chat-msg.user { align-self:flex-end; }
  .chat-msg.assistant { align-self:flex-start; }
  .chat-bubble { padding:8px 12px; border-radius:12px; word-break:break-word; white-space:pre-wrap; }
  .chat-msg.user .chat-bubble { background:#1a3a6b; color:#c8dcff; border-bottom-right-radius:4px; }
  .chat-msg.assistant .chat-bubble { background:var(--card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
  .chat-ts { font-size:.62rem; color:var(--muted); margin-top:3px; }
  .chat-msg.user .chat-ts { text-align:right; }
  .typing-indicator { display:none; align-self:flex-start; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; border-bottom-left-radius:4px; }
  .typing-indicator.show { display:flex; gap:4px; align-items:center; }
  .typing-dot { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2){animation-delay:.2s;} .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
  .quick-actions { padding:8px 12px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:6px; background:var(--bg); flex-shrink:0; }
  .quick-btn { background:var(--card); border:1px solid var(--border); color:var(--text); font-size:.7rem; padding:5px 9px; border-radius:6px; cursor:pointer; white-space:nowrap; transition:border-color .15s,color .15s; }
  .quick-btn:hover { border-color:var(--gold); color:var(--gold); }
  .chat-input-row { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--border); background:var(--card); flex-shrink:0; }
  #chatInput { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:.85rem; outline:none; font-family:inherit; }
  #chatInput:focus { border-color:var(--gold); }
  #chatSendBtn { background:var(--gold); border:none; color:#000; font-weight:700; padding:0 16px; border-radius:8px; cursor:pointer; font-size:.85rem; }
  #chatSendBtn:hover { opacity:.9; }
  #chatSendBtn:disabled { opacity:.5; cursor:not-allowed; }

  /* Holdings */
  .holdings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
  .holding-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .holding-card-header { padding:14px 16px 10px; display:flex; align-items:flex-start; justify-content:space-between; }
  .holding-ticker { font-size:1.4rem; font-weight:700; color:var(--gold); cursor:pointer; }
  .holding-ticker:hover { color:#ffcf6e; }
  .holding-account-badge { font-size:.7rem; color:var(--muted); margin-top:3px; background:var(--bg); border:1px solid var(--border); padding:2px 7px; border-radius:4px; display:inline-block; }
  .holding-price-block { text-align:right; }
  .holding-price-val { font-size:1.1rem; font-weight:600; }
  .holding-day { font-size:.8rem; margin-top:2px; }
  .holding-chart-wrap { width:100%; height:220px; background:var(--bg); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .holding-stats { display:grid; grid-template-columns:1fr 1fr 1fr; }
  .holding-stat { padding:10px 12px; border-right:1px solid var(--border); }
  .holding-stat:last-child { border-right:none; }
  .holding-stat-label { font-size:.66rem; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }
  .holding-stat-value { font-size:.88rem; font-weight:600; }
  .holding-footer { padding:10px 14px; border-top:1px solid var(--border); display:flex; gap:8px; }
  .ask-ai-btn { background:rgba(245,166,35,.1); border:1px solid var(--gold); color:var(--gold); font-size:.75rem; font-weight:600; padding:5px 12px; border-radius:6px; cursor:pointer; transition:background .15s; }
  .ask-ai-btn:hover { background:rgba(245,166,35,.2); }
  .view-chart-btn { background:var(--card); border:1px solid var(--border); color:var(--text); font-size:.75rem; padding:5px 12px; border-radius:6px; cursor:pointer; }
  .view-chart-btn:hover { border-color:var(--blue); color:var(--blue); }

  /* Watchlist */
  .wl-section { margin-bottom:28px; }
  .wl-section-hdr { font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); padding:8px 0 10px; border-bottom:2px solid rgba(245,166,35,.25); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .wl-section-hdr span { color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0; font-size:.82rem; }
  .wl-tier2-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:16px; }
  .wl-tier3-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
  .wl-tier4-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .wl-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .wl-card-hdr { padding:12px 14px 8px; display:flex; align-items:flex-start; justify-content:space-between; }
  .wl-ticker { font-size:1.3rem; font-weight:700; color:var(--gold); cursor:pointer; }
  .wl-ticker:hover { color:#ffcf6e; }
  .wl-ticker-sm { font-size:1.1rem; font-weight:700; color:var(--gold); cursor:pointer; }
  .wl-ticker-sm:hover { color:#ffcf6e; }
  .wl-company { font-size:.75rem; color:var(--muted); margin-top:2px; }
  .wl-price-right { text-align:right; }
  .wl-price { font-size:1rem; font-weight:600; }
  .wl-day { font-size:.78rem; margin-top:2px; }
  .wl-chart-lg { height:220px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--bg); }
  .wl-chart-md { height:170px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--bg); }
  .wl-chart-sm { height:140px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--bg); }
  .wl-chart-lg iframe,.wl-chart-md iframe,.wl-chart-sm iframe { width:100%; height:100%; border:none; display:block; }
  .wl-stats { padding:10px 14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--border); }
  .wl-stat-item { font-size:.78rem; display:flex; flex-direction:column; gap:1px; }
  .wl-stat-lbl { color:var(--muted); font-size:.64rem; text-transform:uppercase; }
  .wl-good-price { padding:10px 14px; background:var(--bg); border-bottom:1px solid var(--border); }
  .wl-good-price-label { font-size:.64rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
  .wl-good-price-val { font-size:.92rem; font-weight:700; }
  .wl-good-price-sub { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .wl-footer { padding:10px 14px; display:flex; gap:8px; justify-content:space-between; align-items:center; }
</style>
</head>
<body>

<nav class="top-nav">
  <button class="nav-tab active" id="navBriefing" onclick="showView('briefing')">Morning Briefing</button>
  <button class="nav-tab" id="navHoldings" onclick="showView('holdings')">Holdings</button>
  <button class="nav-tab" id="navWatchlist" onclick="showView('watchlist')">Watchlist</button>
</nav>

<div class="page-header">
  <h1>Morning Briefing</h1>
  <div class="subtitle" id="timestamp">Loading...</div>
</div>

<div id="briefingView">
  <div id="app"><div class="card" style="text-align:center;padding:40px">Loading...</div></div>
</div>
<div id="holdingsView" style="display:none">
  <div id="holdingsApp"></div>
</div>
<div id="watchlistView" style="display:none">
  <div id="watchlistApp"></div>
</div>

<!-- Stock Detail Modal -->
<div class="modal-overlay" id="tickerModal" onclick="handleModalClick(event)">
  <div class="modal-box" id="tickerModalBox">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="modal-hdr-ticker" id="mhTicker">—</div>
        <div class="modal-hdr-company" id="mhCompany"></div>
        <div class="modal-meta" id="mhMeta"></div>
      </div>
      <div class="modal-hdr-right">
        <div class="modal-price" id="mhPrice"></div>
        <div class="modal-day" id="mhDay"></div>
      </div>
      <button class="modal-close" onclick="closeTickerModal()">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab-btn active" id="mtbChart"   onclick="switchModalTab('chart')">&#9632; Chart</button>

// ── Ticker linkifier ───────────────────────────────────────────────────────
function linkifyTickers(text) {
  if (!_data) return escHtml(text);
  const tickers = Object.keys(_data.ticker_details || {}).sort((a,b) => b.length - a.length);
  if (!tickers.length) return escHtml(text);
  const holders = {};
  let i = 0;
  let result = text;
  tickers.forEach(t => {
    const pat = new RegExp('\\b' + t.replace(/\./g,'\\.') + '\\b', 'g');
    if (pat.test(result)) {
      const key = '\x00' + (i++) + '\x00';
      holders[key] = `<span class="tk" onclick="openModal('${t}')" style="color:#F5A623;font-weight:bold;cursor:pointer;">${t}</span>`;
      result = result.replace(new RegExp('\\b' + t.replace(/\./g,'\\.') + '\\b', 'g'), key);
    }
  });
  result = result.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  Object.entries(holders).forEach(([k,v]) => { result = result.split(k).join(v); });
  return result;
}

  return (EXCHANGE_MAP[clean] || 'NASDAQ') + ':' + clean;

function loadTVScript(cb) {
  if (window.TradingView) { cb(); return; }
  if (_tvLoaded) {
    const iv = setInterval(() => { if (window.TradingView) { clearInterval(iv); cb(); } }, 100);
    return;
  }
  _tvLoaded = true;
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/tv.js';
  s.onload = cb;
  document.head.appendChild(s);
}

function createTVChart(containerId, ticker, height) {

    el.innerHTML = `<div id="${uid}" style="height:100%;width:100%"></div>`;

      symbol: getTVSymbol(ticker),
      interval: 'D', range: '6M', theme: 'dark', style: '1', locale: 'en',
      toolbar_bg: '#161b22', width: '100%', height: height || 500,
      container_id: uid, save_image: false, enable_publishing: false,
    });
  });
}

  };
  return `<span class="badge ${m[status]||'badge-hold'}">${escHtml(status||'')}</span>`;
}
function scoreColor(s) {
  if (!s) return 'var(--muted)';
  if (s >= 90) return 'var(--green)'; if (s >= 80) return 'var(--blue)';
  if (s >= 70) return 'var(--yellow)'; return 'var(--red)';
}

  if (!s) return '—';
  if (s >= 90) return 'Strong Buy'; if (s >= 80) return 'Approved';

}

function toggleChat() {

function openChatWithTicker(ticker) {

  $('chatInput').value = msg;

}
function buildSystemWithContext() {
  if (!_data) return ADVISOR_SYSTEM;
  const p = _data.portfolio;
  const pos = (p.positions||[]).map(x =>
    `${x.ticker}: ${x.shares} shares @ $${fmt(x.avg_cost||0,2)} avg — $${fmt(x.price,2)} ${x.currency} — ${fmtMoney(x.value_cad)} CAD (${sign(x.gain_pct||0)}${fmt(x.gain_pct||0,1)}%, wt ${fmt(x.weight_pct||0,1)}%)`
  ).join('\n');
  const fb = (_data.focus_buys||[]).slice(0,5).map(f => `${f.ticker}: $${fmt(f.price)} — ${f.zone_status} — Score ${f.score}`).join('\n');
  const flags = (_data.thesis_flags||[]).map(tf => `${tf.ticker}: ${tf.title}`).join('\n');
  return ADVISOR_SYSTEM + `\n\nLIVE DATA (${_data.generated_at}):\nTotal: ${fmtMoney(p.total_cad)} | Gain: ${sign(p.total_gain_pct)}${fmt(p.total_gain_pct,1)}% | FX: ${p.fx_rate}\n\nPOSITIONS:\n${pos}\n\nFOCUS BUYS:\n${fb||'None'}\n\nACTIVE FLAGS:\n${flags||'None'}`;
}
function renderChatHistory() {
  const c = $('chatMessages');
  c.innerHTML = '';
  if (!_chatHistory.length) {
    c.innerHTML = `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:24px">Good morning. Ask me anything about your portfolio, a specific stock, or what to do with your next deposit.</div>`;
    return;
  }
  _chatHistory.forEach(m => {
    const div = document.createElement('div');
    div.className = `chat-msg ${m.role}`;
    div.innerHTML = `<div class="chat-bubble">${escHtml(m.content)}</div><div class="chat-ts">${m.ts||''}</div>`;
    c.appendChild(div);
  });
  c.scrollTop = c.scrollHeight;
}
function appendOrUpdateStream(chunk) {
  const c = $('chatMessages');
  if (!_streamDiv) {
    $('typingIndicator').classList.remove('show');
    _streamText = '';
    _streamDiv = document.createElement('div');
    _streamDiv.className = 'chat-msg assistant';
    _streamDiv.innerHTML = `<div class="chat-bubble"></div><div class="chat-ts">${nowTs()}</div>`;
    c.appendChild(_streamDiv);
  }
  _streamText += chunk;
  _streamDiv.querySelector('.chat-bubble').textContent = _streamText;
  c.scrollTop = c.scrollHeight;
}
function sendChat(override) {
  const input = $('chatInput');
  const msg = override || input.value.trim();
  if (!msg) return;
  if (!override) input.value = '';
  $('chatSendBtn').disabled = true;
  _streamDiv = null; _streamText = '';
  const ts = nowTs();
  _chatHistory.push({role:'user',content:msg,ts});
  const c = $('chatMessages');
  const ph = c.querySelector('[style*="text-align:center"]');
  if (ph) ph.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = `<div class="chat-bubble">${escHtml(msg)}</div><div class="chat-ts">${ts}</div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
  saveChat();
  $('typingIndicator').classList.add('show');
  callAdvisorAPI(
    _chatHistory.map(m => ({role:m.role,content:m.content})),
    buildSystemWithContext(),
    chunk => appendOrUpdateStream(chunk),
    full  => {
      _chatHistory.push({role:'assistant',content:full,ts:nowTs()});
      saveChat();
      _streamDiv = null;
      $('typingIndicator').classList.remove('show');
      $('chatSendBtn').disabled = false;
    }
  );
}

}

// ── Anthropic streaming proxy ──────────────────────────────────────────────
async function callAdvisorAPI(messages, system, onChunk, onDone) {
  let full = '';
  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages,system}),
    });
    if (!res.ok) {
      const err = `API error ${res.status}. Run: python scripts/server.py`;
      onChunk(err); onDone(err); return;
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') { onDone(full); return; }
        try {
          const {text,error} = JSON.parse(raw);
          if (error) { onChunk('\n[Error: '+error+']'); onDone(full); return; }
          if (text) { full += text; onChunk(text); }
        } catch(e){}
      }
    }
    onDone(full);
  } catch(e) {
    const err = 'Cannot reach /api/chat. Start with: python scripts/server.py';
    onChunk(err); onDone(err);
  }
}

        <div class="progress-bar-fill" style="width:${pct}%;background:${col}"></div>
        <div class="progress-bar-target" style="left:${tp}%"></div>
        <div class="progress-bar-text">${fmtMoney(b.current_cad)} (gap: ${fmtMoney(b.gap_cad)})</div>
      </div></div>`;
  });
  html += `<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Theme: ${d.progress.theme_exposure_pct}% | Diversified: ${d.progress.diversified_pct}%</div></div>`;

  // What Changed
  html += `<div class="card"><h2>What Changed</h2>`;
  if (d.what_changed && d.what_changed.length) {
    d.what_changed.forEach(c => html += `<div style="margin-bottom:6px;font-size:.85rem">${linkifyTickers(c)}</div>`);
  } else {
    html += `<div style="color:var(--muted)">No changes detected.</div>`;
  }
  html += `</div></div>`;

  // Portfolio Snapshot
  html += `<div class="card"><h2>Portfolio Snapshot</h2><table>
    <tr><th>Ticker</th><th class="r">Shares</th><th class="r">Price</th><th class="r">Day</th><th class="r">Value CAD</th><th class="r">Gain</th><th class="r">G%</th><th class="r">Weight</th></tr>`;
  p.positions.sort((a,b) => b.value_cad - a.value_cad).forEach(pos => {
    const c = pos.currency === 'CAD' ? 'C' : 'U';
    html += `<tr>
      <td>${tk(pos.ticker)}</td><td class="r">${fmt(pos.shares,4)}</td>
      <td class="r">${fmt(pos.price)}${c}</td>
      <td class="r ${cls(pos.day_pct)}">${sign(pos.day_pct)}${fmt(pos.day_pct,1)}%</td>
      <td class="r">${fmtMoney(pos.value_cad)}</td>
      <td class="r ${cls(pos.gain_cad)}">${sign(pos.gain_cad)}${fmtMoney(Math.abs(pos.gain_cad))}</td>
      <td class="r ${cls(pos.gain_pct)}">${sign(pos.gain_pct)}${fmt(pos.gain_pct,1)}%</td>
      <td class="r">${fmt(pos.weight_pct,1)}%</td></tr>`;
  });
  html += `<tr style="font-weight:700"><td>Cash</td><td></td><td></td><td></td><td class="r">${fmtMoney(p.cash_cad)}</td><td></td><td></td><td></td></tr>`;
  html += `<tr style="font-weight:700;border-top:2px solid var(--border)"><td>TOTAL</td><td></td><td></td><td></td><td class="r">${fmtMoney(p.total_cad)}</td>
    <td class="r ${cls(p.total_gain_cad)}">${sign(p.total_gain_cad)}${fmtMoney(Math.abs(p.total_gain_cad))}</td>
    <td class="r ${cls(p.total_gain_pct)}">${sign(p.total_gain_pct)}${fmt(p.total_gain_pct,1)}%</td><td></td></tr>`;
  html += `</table></div>`;

  html += `<div class="grid-2">`;

  // Cap Status
  html += `<div class="card"><h2>Cap Status</h2><table>
    <tr><th>Ticker</th><th class="r">Weight</th><th class="r">Cap</th><th class="r">Room</th><th>Status</th></tr>`;
  d.caps.positions.forEach(c => {
    html += `<tr><td>${tk(c.ticker)}</td><td class="r">${fmt(c.weight_pct,1)}%</td>
      <td class="r">${c.cap_pct?c.cap_pct+'%':'—'}</td>
      <td class="r">${c.room_cad!==null?fmtMoney(c.room_cad):'—'}</td>
      <td>${badge(c.status)}</td></tr>`;
  });
  html += `</table></div>`;

  // Focus Buys
  html += `<div class="card"><h2>Focus Buys</h2><table>
    <tr><th>#</th><th>Ticker</th><th class="r">Price</th><th class="r">Day</th><th>Zone</th><th class="r">Score</th><th class="r">Room</th></tr>`;
  d.focus_buys.forEach(fb => {
    const c = fb.currency === 'CAD' ? 'C' : 'U';
    html += `<tr><td>${fb.rank}</td><td>${tk(fb.ticker)}</td>
      <td class="r">${fmt(fb.price)}${c}</td>
      <td class="r ${cls(fb.day_pct)}">${sign(fb.day_pct)}${fmt(fb.day_pct,1)}%</td>
      <td>${badge(fb.zone_status)}</td>
      <td class="r">${fb.score||'—'}</td>
      <td class="r">${fb.room_cad!==null?fmtMoney(fb.room_cad):'—'}</td></tr>`;
  });
  html += `</table></div></div>`;

  // Thesis Flags
  if (d.thesis_flags && d.thesis_flags.length) {
    html += `<div class="card"><h2>Thesis-Break Watch</h2>`;
    d.thesis_flags.forEach(tf => {
      html += `<div class="thesis-flag">${tk(tf.ticker)}: "${escHtml(tf.title)}"<br>
        <span style="color:var(--muted);font-size:.82rem">Matched: ${escHtml(tf.matched_keyword)}</span></div>`;
    });
    html += `</div>`;
  }

  // News — collapsible
  html += `<div class="card"><h2 class="collapsible-toggle" onclick="toggleCollapse(this)">News &amp; Catalysts (7 days)</h2><div class="collapsible-body">`;
  if (d.news.length) {
    d.news.slice(0,25).forEach(n => {
      const tHtml = n.link
        ? `<a href="${n.link}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;border-bottom:1px dotted var(--muted)">${escHtml(n.title)}</a>`
        : escHtml(n.title);
      html += `<div class="news-item"><span class="tk" onclick="openModal('${n.ticker}')" style="color:#F5A623;font-weight:bold;cursor:pointer;">${n.ticker}</span> ${tHtml}<div class="news-pub">${escHtml(n.publisher||'')} — ${escHtml(n.published||'')}</div></div>`;
    });
  } else { html += `<div style="color:var(--muted)">No recent news.</div>`; }
  html += `</div></div>`;

  // Full Price Board
  html += `<div class="card"><h2>Full Price Board</h2><table>
    <tr><th>Ticker</th><th class="r">Price</th><th class="r">Change</th><th class="r">%</th><th class="r">Ccy</th></tr>`;
  d.price_board.forEach(pb => {
    html += `<tr><td>${tk(pb.ticker)}</td><td class="r">${fmt(pb.price)}</td>
      <td class="r ${cls(pb.change)}">${sign(pb.change)}${fmt(pb.change)}</td>
      <td class="r ${cls(pb.pct_change)}">${sign(pb.pct_change)}${fmt(pb.pct_change,1)}%</td>
      <td class="r">${pb.currency}</td></tr>`;
  });
  html += `</table></div>`;

  // TFSA
  const t = d.tfsa;
  html += `<div class="card"><h2>TFSA Room</h2>
    <div class="stats-row">
      <div class="stat"><div class="stat-value">${fmtMoney(t.contributed)}</div><div class="stat-label">Contributed</div></div>
      <div class="stat"><div class="stat-value">${fmtMoney(t.remaining_room)}</div><div class="stat-label">Room Left</div></div>
      <div class="stat"><div class="stat-value">${fmtMoney(t.annual_limit)}</div><div class="stat-label">Annual Limit</div></div>
      <div class="stat"><div class="stat-value">~${t.est_weeks_to_target}w</div><div class="stat-label">Est. Weeks to $5K</div></div>
    </div>
    <div class="progress-row">
      <div class="progress-label"><span>Progress to $5K</span><span>${fmtMoney(t.current_total)} / ${fmtMoney(t.target)}</span></div>
      <div class="progress-bar-bg" style="height:24px">
        <div class="progress-bar-fill" style="width:${Math.min((t.current_total/t.target)*100,100)}%;background:var(--blue)"></div>
        <div class="progress-bar-text" style="line-height:24px">${fmt((t.current_total/t.target)*100,1)}%</div>
      </div>
    </div></div>`;

  $('app').innerHTML = html;

  // Pre-render other tabs so they're ready instantly on click
  renderHoldings(d);
  renderWatchlist(d);
}

function toggleCollapse(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}

async function load() {
  try {
    const r = await fetch('data.json?' + Date.now());
    const d = await r.json();
    render(d);
  } catch(e) {
    $('app').innerHTML = `<div class="card" style="text-align:center"><p>Could not load data.json</p><p style="color:var(--muted);font-size:.82rem">${e.message}</p></div>`;
  }
}

load();
renderChatHistory();
</script>
</body>
</html>
